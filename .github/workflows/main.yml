name: El Toroide Adiamantado

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Otorgar permisos de ejecución a los scripts
        run: chmod +x ./scripts/*.sh

      - name: Ejecutar Gerrit Client (Protocolo Maat)
        run: ./scripts/gerrit_client.sh

      - name: Ejecutar Motor de Análisis (Node.js)
        run: node src/index.js
        env:
          NODE_ENV: production

