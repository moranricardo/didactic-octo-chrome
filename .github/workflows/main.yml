name: El Toroide Adiamantado (Evolución 818)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      
      - name: Install Dependencies
        run: npm install

      - name: Pre-flight Bridge Check
        run: node test-bridge.js
        continue-on-error: false

      - name: Run Vortex Cycle & Monitoring
        run: |
          node index.js
          node screenshot-monitor.js

      - name: Persistent Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Evolución 818: Sincronización completa [skip ci]" && git push)