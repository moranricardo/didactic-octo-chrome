name: El Toroide Adiamantado (Evolución 818)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-detectar Directorio de Trabajo
        run: |
          TARGET_DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          echo "Núcleo localizado en: $TARGET_DIR"
          echo "WORKDIR=$TARGET_DIR" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Dependencias (Forzada)
        run: |
          npm cache clean --force
          npm ci
        working-directory: ${{ env.WORKDIR }}

      - name: Instalar Navegador
        run: npx puppeteer browsers install chrome
        working-directory: ${{ env.WORKDIR }}

      - name: Validación del Puente
        run: node test-bridge.js
        working-directory: ${{ env.WORKDIR }}
        continue-on-error: false

      - name: Ejecución del Ciclo del Vórtice
        run: |
          node index.js
          node screenshot-monitor.js
        working-directory: ${{ env.WORKDIR }}

      - name: Persistencia del Núcleo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/
          if ! git diff --cached --quiet; then
            git commit -m "Evolución 818: Sincronización exitosa [skip ci]"
            git push origin main
          fi
        working-directory: ${{ env.WORKDIR }}