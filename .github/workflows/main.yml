name: El Toroide Adiamantado (Evolución 818)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1

      - name: Install Dependencies
        run: npm install

      - name: Pre-flight Bridge Check
        run: node test-bridge.js
        continue-on-error: false

      - name: Run Vortex Cycle & Monitoring
        run: |
          node index.js
          node screenshot-monitor.js

      - name: Persistent Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/
          # Solo hace commit si hay cambios reales
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Evolución 818: Sincronización completa [skip ci]"
            git push origin main
          else
            echo "Sin cambios, el Vórtice está estable."
          fi