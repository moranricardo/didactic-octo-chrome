name: El Toroide Adiamantado (Evolución 818 - Integrado)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NODE_ENV: production
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalación Ligera
        run: npm ci --prefer-offline

      - name: 📡 Ejecutar Motor de Red Ra Pulse
        run: node index.cjs

      - name: 💾 Persistir Estado en Repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: actualizar estado de auditoría" && git push)
