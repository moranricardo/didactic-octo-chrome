name: El Toroide Adiamantado (Evolución 818)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ubicar y Preparar el Núcleo
        run: |
          # Busca dónde está el package.json
          DIR=$(find . -name "package.json" -exec dirname {} \;)
          echo "Núcleo encontrado en: $DIR"
          echo "WORKDIR=$DIR" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Dependencias
        run: npm ci
        working-directory: ${{ env.WORKDIR }}

      - name: Validación del Puente
        run: node test-bridge.js
        working-directory: ${{ env.WORKDIR }}

      - name: Ejecución del Ciclo del Vórtice
        run: |
          node index.js
          node screenshot-monitor.js
        working-directory: ${{ env.WORKDIR }}

      - name: Persistencia del Núcleo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/
          if ! git diff --cached --quiet; then
            git commit -m "Evolución 818: Sincronización completa [skip ci]"
            git push origin main
          else
            echo "Sin cambios para persistir."
          fi
        working-directory: ${{ env.WORKDIR }}