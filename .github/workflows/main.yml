name: El Toroide Adiamantado (Evolución 818)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Paso crítico: Diagnóstico y limpieza
      - name: Preparación del Núcleo
        run: |
          ls -F
          # Asegura que las carpetas necesarias existan
          mkdir -p screenshots

      - name: Instalar Dependencias
        run: npm ci

      - name: Instalar Navegador
        run: npx puppeteer browsers install chrome

      - name: Validación del Puente
        run: node test-bridge.js
        continue-on-error: false

      - name: Ejecución del Ciclo del Vórtice
        run: |
          node index.js
          node screenshot-monitor.js

      - name: Persistencia del Núcleo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/
          if ! git diff --cached --quiet; then
            git commit -m "Evolución 818: Sincronización completa [skip ci]"
            git push origin main
          else
            echo "Sin cambios para persistir."
          fi