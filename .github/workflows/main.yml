name: El Toroide Adiamantado (Evolución 818 - Optimizado)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalación Ligera
        run: |
          npm ci --prefer-offline --no-audit

      - name: Ejecución del Ciclo del Vórtice
        run: |
          node index.js
          node screenshot-monitor.js

      - name: Persistencia del Núcleo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add diamond_core.json screenshots/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Evolución 818: Sincronización exitosa [skip ci]"
            git push origin main
          fi