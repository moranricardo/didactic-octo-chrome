name: Screenshot Automation

on:
  schedule:
    - cron: '0 9 * * *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run Screenshot Monitor
        run: |
          ./path/to/screenshot-monitor-script.sh

      - name: Save Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: screenshots
          path: ./path/to/screenshots/*

      - name: Error Handling
        if: failure()
        run: |
          echo 'An error occurred while running the screenshot monitor script.'
          exit 1
