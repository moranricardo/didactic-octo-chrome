name: Screenshot Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Take screenshot
        uses: flamedash/screenshot-action@v1.1.0
        with:
          url: https://www.google.com
          output: daily-screenshot.png

      - name: Save screenshot to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-screenshot.png
          git commit -m "Automatic screenshot upload" || echo "No changes"
          git push
